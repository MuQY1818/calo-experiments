[mypy]
python_version = 3.11
check_untyped_defs = True
disallow_incomplete_defs = True
no_implicit_optional = True
show_error_codes = True
warn_redundant_casts = True
warn_unused_ignores = True
exclude = ^(artifacts|benchmarks|build|dist|python-venv)/

[mypy-gymnasium.*]
ignore_missing_imports = True

[mypy-joblib.*]
ignore_missing_imports = True

[mypy-lightgbm.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-stable_baselines3.*]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True

[mypy-transformers.*]
ignore_missing_imports = True

# These accepted-paper core modules are intentionally frozen for v1. New and
# split release-boundary modules remain fully checked by the global rules.
[mypy-rl_optimizer.action_space,rl_optimizer.baselines,rl_optimizer.dynamic_environment,rl_optimizer.environment,rl_optimizer.lightgbm_service_surrogate,rl_optimizer.pure_ppo,rl_optimizer.service_model,rl_optimizer.workload_sources]
ignore_errors = True
