include classpath("standalone.conf")

whisk {
  config {
    limits-triggers-fires-perMinute = 6000
    limits-actions-invokes-perMinute = 6000
    limits-actions-invokes-concurrent = 256
  }

  memory {
    min = 128 m
    max = 1024 m
    std = 256 m
  }

  namespace-default-limit {
    memory {
      min = 128 m
      max = 1024 m
    }
  }

  container-pool {
    user-memory = 2048 m
  }
}
